<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard QA Ejecutivo</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">

        <h1>📊 Dashboard QA Ejecutivo</h1>

        <div class="cards">

            <div class="card">
                <h3>Total Tests</h3>
                <p id="totalTests">0</p>
            </div>

            <div class="card success">
                <h3>Passed</h3>
                <p id="passed">0</p>
            </div>

            <div class="card fail">
                <h3>Failed</h3>
                <p id="failed">0</p>
            </div>

            <div class="card warning">
                <h3>Success Rate</h3>
                <p id="successRate">0%</p>
            </div>

        </div>

        <div class="section">
            <h2>Resumen</h2>

            <p>Estado: <strong id="status"></strong></p>
            <p>Duración: <strong id="duration"></strong></p>
            <p>Fecha: <strong id="executionDate"></strong></p>
        </div>

        <div class="section">
            <h2>Pruebas Fallidas</h2>
            <ul id="failedTests"></ul>
        </div>

        <div class="section">
            <h2>📈 Success Rate Histórico</h2>
            <canvas id="successChart"></canvas>
        </div>

        <div class="section">
            <h2>⏱ Duración Histórica</h2>
            <canvas id="durationChart"></canvas>
        </div>

        <div class="section">
            <h2>📋 Últimas 10 Ejecuciones</h2>

            <table id="historyTable">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Success Rate</th>
                        <th>Duración</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="section">
            <h2>⚠ Tests Inestables</h2>
            <ul id="flakyTests"></ul>
        </div>

    </div>

    <!-- JavaScript -->
    <!-- <script src="app.js"></script> -->
    <script src="app.js?v=3"></script>

</body>

</html>
